name: Build Astra Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'astra-wakeup-android/**'
      - '.github/workflows/astra-android-build.yml'
  pull_request:
    paths:
      - 'astra-wakeup-android/**'
      - '.github/workflows/astra-android-build.yml'

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: astra-wakeup-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon --stacktrace :app:assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: astra-wakeup-debug-apk
          path: astra-wakeup-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: astra-wakeup-debug-build-logs
          path: |
            astra-wakeup-android/app/build/reports
            astra-wakeup-android/app/build/outputs/logs
          if-no-files-found: warn
          retention-days: 14

  build-signed-release-apk:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: astra-wakeup-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify signing secrets exist
        env:
          ASTRA_KEYSTORE_B64: ${{ secrets.ASTRA_KEYSTORE_B64 }}
          ASTRA_KEY_ALIAS: ${{ secrets.ASTRA_KEY_ALIAS }}
          ASTRA_KEY_PASSWORD: ${{ secrets.ASTRA_KEY_PASSWORD }}
          ASTRA_STORE_PASSWORD: ${{ secrets.ASTRA_STORE_PASSWORD }}
        run: |
          test -n "$ASTRA_KEYSTORE_B64" || (echo "Missing ASTRA_KEYSTORE_B64" && exit 1)
          test -n "$ASTRA_KEY_ALIAS" || (echo "Missing ASTRA_KEY_ALIAS" && exit 1)
          test -n "$ASTRA_KEY_PASSWORD" || (echo "Missing ASTRA_KEY_PASSWORD" && exit 1)
          test -n "$ASTRA_STORE_PASSWORD" || (echo "Missing ASTRA_STORE_PASSWORD" && exit 1)

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        env:
          ASTRA_KEYSTORE_B64: ${{ secrets.ASTRA_KEYSTORE_B64 }}
        run: |
          echo "$ASTRA_KEYSTORE_B64" | base64 -d > app/astra-release.jks

      - name: Build signed release APK
        env:
          ASTRA_KEY_ALIAS: ${{ secrets.ASTRA_KEY_ALIAS }}
          ASTRA_KEY_PASSWORD: ${{ secrets.ASTRA_KEY_PASSWORD }}
          ASTRA_STORE_PASSWORD: ${{ secrets.ASTRA_STORE_PASSWORD }}
        run: |
          ./gradlew --no-daemon --stacktrace :app:assembleRelease \
            -PASTRA_KEYSTORE_PATH=app/astra-release.jks \
            -PASTRA_KEY_ALIAS="$ASTRA_KEY_ALIAS" \
            -PASTRA_KEY_PASSWORD="$ASTRA_KEY_PASSWORD" \
            -PASTRA_STORE_PASSWORD="$ASTRA_STORE_PASSWORD"

      - name: Upload signed release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: astra-signed-release-apk
          path: astra-wakeup-android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload signed build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: astra-signed-release-build-logs
          path: |
            astra-wakeup-android/app/build/reports
            astra-wakeup-android/app/build/outputs/logs
          if-no-files-found: warn
          retention-days: 14

  publish-rolling-release:
    if: github.ref == 'refs/heads/main'
    needs: build-signed-release-apk
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download signed release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: astra-signed-release-apk
          path: dist

      - name: Publish rolling pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: astra-latest
          prerelease: true
          name: Astra Wake-Up (latest)
          files: dist/app-release.apk
