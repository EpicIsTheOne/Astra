name: Release Astra Android (signed)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Git tag to publish (clean format: v0.2.0)'
        required: true
        default: 'v0.2.0'
      release_name:
        description: 'Release title'
        required: true
        default: ''
      prerelease:
        description: 'Publish as prerelease'
        required: true
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-signed-release-apk:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version_meta.outputs.version_name }}
      version_code: ${{ steps.version_meta.outputs.version_code }}
      release_title: ${{ steps.version_meta.outputs.release_title }}
    timeout-minutes: 30
    defaults:
      run:
        working-directory: astra-android
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate signing secrets
        shell: bash
        run: |
          set -euo pipefail
          for var in ASTRA_KEYSTORE_B64 ASTRA_KEY_ALIAS ASTRA_KEY_PASSWORD ASTRA_STORE_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: $var" >&2
              exit 1
            fi
          done
        env:
          ASTRA_KEYSTORE_B64: ${{ secrets.ASTRA_KEYSTORE_B64 }}
          ASTRA_KEY_ALIAS: ${{ secrets.ASTRA_KEY_ALIAS }}
          ASTRA_KEY_PASSWORD: ${{ secrets.ASTRA_KEY_PASSWORD }}
          ASTRA_STORE_PASSWORD: ${{ secrets.ASTRA_STORE_PASSWORD }}

      - name: Decode Android keystore
        shell: bash
        run: |
          set -euo pipefail
          echo "$ASTRA_KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/astra-release.keystore"
        env:
          ASTRA_KEYSTORE_B64: ${{ secrets.ASTRA_KEYSTORE_B64 }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-cleanup: never

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Derive release version metadata
        id: version_meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION_NAME="${INPUT_TAG#v}"
          VERSION_CODE="${GITHUB_RUN_NUMBER}"
          if [ -n "${INPUT_NAME:-}" ]; then
            RELEASE_TITLE="$INPUT_NAME"
          else
            RELEASE_TITLE="Astra Android ${VERSION_NAME}"
            if [ "${INPUT_PRERELEASE}" = "true" ]; then
              RELEASE_TITLE="${RELEASE_TITLE} (signed prerelease)"
            else
              RELEASE_TITLE="${RELEASE_TITLE}"
            fi
          fi
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "release_title=$RELEASE_TITLE" >> "$GITHUB_OUTPUT"
        env:
          INPUT_TAG: ${{ inputs.release_tag }}
          INPUT_NAME: ${{ inputs.release_name }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}

      - name: Build signed release APK
        run: >-
          ./gradlew --no-daemon --stacktrace
          -PASTRA_VERSION_NAME="${{ steps.version_meta.outputs.version_name }}"
          -PASTRA_VERSION_CODE="${{ steps.version_meta.outputs.version_code }}"
          -PASTRA_KEYSTORE_PATH="$RUNNER_TEMP/astra-release.keystore"
          -PASTRA_KEY_ALIAS="$ASTRA_KEY_ALIAS"
          -PASTRA_KEY_PASSWORD="$ASTRA_KEY_PASSWORD"
          -PASTRA_STORE_PASSWORD="$ASTRA_STORE_PASSWORD"
          :app:assembleRelease
        env:
          ASTRA_KEY_ALIAS: ${{ secrets.ASTRA_KEY_ALIAS }}
          ASTRA_KEY_PASSWORD: ${{ secrets.ASTRA_KEY_PASSWORD }}
          ASTRA_STORE_PASSWORD: ${{ secrets.ASTRA_STORE_PASSWORD }}

      - name: Upload signed release APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: astra-release-apk
          path: astra-android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: astra-release-build-logs
          path: |
            astra-android/app/build/reports
            astra-android/app/build/outputs/logs
          if-no-files-found: warn
          retention-days: 14

      - name: Remove decoded keystore
        if: always()
        shell: bash
        run: rm -f "$RUNNER_TEMP/astra-release.keystore"

  publish-signed-release:
    needs: build-signed-release-apk
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download signed release APK artifact
        uses: actions/download-artifact@v8
        with:
          name: astra-release-apk
          path: dist

      - name: Publish signed GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ needs.build-signed-release-apk.outputs.release_title }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: dist/app-release.apk
